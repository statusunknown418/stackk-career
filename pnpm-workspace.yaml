packages:
  - apps/*
  - packages/*
overrides:
  # better-auth and trigger.dev's @opentelemetry stack resolve @opentelemetry/api to
  # different versions; without pinning, the package gets duplicated and typecheck breaks
  # (~36 incompatible-type errors across the copies). Pinned to 1.9.1 to dedupe.
  # Do NOT remove without confirming via clean reinstall + typecheck that no duplication occurs.
  "@opentelemetry/api": "1.9.1"
allowBuilds:
  "@depot/cli": true
  core-js: false
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true
catalog:
  ai: ^6.0.209
  "@libsql/client": 0.15.15
  "@orpc/ai-sdk": ^1.14.6
  "@orpc/client": ^1.14.6
  "@orpc/openapi": ^1.14.6
  "@orpc/server": ^1.14.6
  "@orpc/zod": ^1.14.6
  "@types/node": ^25.9.4
  "@types/react": ^19.2.17
  "@types/react-dom": ^19.2.3
  better-auth: 1.6.13
  better-call: ^2.0.4
  dotenv: ^17.4.2
  libsql: 0.5.22
  lucide-react: ^1.21.0
  next-themes: ^0.4.6
  react: ^19.2.7
  react-dom: ^19.2.7
  sonner: ^2.0.7
  tailwindcss: ^4.3.1
  zod: ^4.4.3
  "evlog": "^2.19.2"
  "@trigger.dev/sdk": ^4.4.6
  "@trigger.dev/react-hooks": ^4.4.6
  "trigger.dev": ^4.4.6
  drizzle-orm: ^0.45.2
  drizzle-zod: ^0.8.3
  date-fns: ^4.4.0
  "@better-auth/infra": ^0.2.14
  nitro: 3.0.260415-beta
  resend: ^6.14.0
  "@react-email/components": ^1.0.12
  "@react-email/render": ^2.0.9
  react-email: ^6.6.4
  "@react-email/ui": ^6.6.4
